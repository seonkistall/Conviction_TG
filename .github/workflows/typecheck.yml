# v2.28 — Lint + typecheck guardrails.
#
# Existing CI (.github/workflows/ci.yml) runs the Playwright smoke
# suite, which catches runtime regressions but not type errors before
# `next build`. This workflow runs `next lint` and `tsc --noEmit` in
# parallel so a typo or unused export blocks the PR earlier (and faster
# — typecheck completes in <30s vs Playwright's ~5min).
#
# Both jobs run in parallel with `concurrency.group` per branch, so
# rapid pushes cancel stale in-flight runs.
name: typecheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit
