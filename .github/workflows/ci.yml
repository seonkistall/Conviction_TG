# v2.14 — Run the Playwright smoke suite on every PR + push to main.
#
# What we run
# -----------
# - Install with npm ci against the lockfile.
# - `next build` (catches type errors + bad imports we'd miss in dev).
# - `playwright install --with-deps chromium` (one browser; the local
#   suite tests webkit + android too, but CI sticks to chromium for
#   speed — webkit runs on demand if the PR touches Safari-relevant
#   files).
# - `playwright test --project=chromium`. The OG snapshot suite is
#   default-on (v2.15), so this transparently includes pixel-regression
#   coverage. Set OG_SNAPSHOTS=0 in repo secrets if you ever need to
#   silence it.
#
# Cache
# -----
# We cache ~/.cache/ms-playwright keyed on the @playwright/test
# version pinned in package-lock.json. Cold installs only happen on a
# version bump, not every push.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache Playwright browsers between runs. The cache key folds in
      # the @playwright/test entry from the lockfile so a version bump
      # invalidates it cleanly.
      - name: Compute Playwright version
        id: pw
        run: |
          VERSION=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npm run build

      - name: Run Playwright smoke (chromium)
        run: npx playwright test --project=chromium

      # Always upload the report — easier to debug a CI-only failure
      # than to re-run locally with `--reporter=html`.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
