# v2.14 — Run the Playwright smoke suite on every PR + push to main.
#
# What we run
# -----------
# - Install with npm ci against the lockfile.
# - `next build` (catches type errors + bad imports we'd miss in dev).
# - `playwright install --with-deps chromium` (one browser; the local
#   suite tests webkit + android too, but CI sticks to chromium for
#   speed — webkit runs on demand if the PR touches Safari-relevant
#   files).
# - `playwright test --project=chromium`. The OG snapshot suite is
#   default-on (v2.15), so this transparently includes pixel-regression
#   coverage. Set OG_SNAPSHOTS=0 in repo secrets if you ever need to
#   silence it.
#
# Cache
# -----
# We cache ~/.cache/ms-playwright keyed on the @playwright/test
# version pinned in package-lock.json. Cold installs only happen on a
# version bump, not every push.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache Playwright browsers between runs. The cache key folds in
      # the @playwright/test entry from the lockfile so a version bump
      # invalidates it cleanly.
      - name: Compute Playwright version
        id: pw
        run: |
          VERSION=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # v2.26.5: Cache key includes the browser set ("chromium-webkit")
      # so adding/removing browsers cleanly invalidates the cache. The
      # previous key (`pw-<os>-<version>`) silently reused a stale
      # chromium-only cache after v2.25 added webkit, causing every
      # mobile-iphone-14-webkit test to fail with "Executable doesn't
      # exist at .cache/ms-playwright/webkit-XXXX/pw_run.sh" because
      # the cache-hit branch only ran `install-deps` (apt packages),
      # not `install` (browser binaries).
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}-chromium-webkit

      # v2.25: Also install webkit + its system libs so the WebKit
      # mobile project (mobile-iphone-14-webkit) can actually run on
      # CI. Previously webkit was in the playwright config but the
      # runner skipped it because libgtk-4 / libgraphene / libsecret
      # weren't installed — real Safari regressions slipped through.
      # `--with-deps webkit` pulls the right apt packages; the Chromium
      # entry above still handles the Chrome-flavored projects.
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - run: npm run build

      - name: Run Playwright smoke (chromium)
        run: npx playwright test --project=chromium

      # v2.25: Mobile smoke including webkit. Runs after the chromium
      # smoke so a webkit-only flake doesn't block the chromium report
      # upload. Keep mobile projects green to catch the Safari-specific
      # quirks (backdrop-filter stacking, dvh handling, scroll-snap
      # stop) that don't surface on Chromium-over-iPhone-device-metrics.
      - name: Run Playwright mobile smoke
        run: npx playwright test --project=mobile-iphone-se --project=mobile-iphone-14 --project=mobile-iphone-14-webkit --project=mobile-pixel-5 --project=mobile-galaxy-s9plus --project=mobile-android-tall
        continue-on-error: false

      # Always upload the report — easier to debug a CI-only failure
      # than to re-run locally with `--reporter=html`.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
